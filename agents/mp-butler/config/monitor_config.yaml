# 内容过滤规则
filter:
  # 排除关键词（低质量内容）
  exclude_keywords: ["thanks", "congratulations", "happy", "birthday", "weekend", "lunch"]
  # 必须包含的最低互动数
  min_engagement:
    high_priority: 500
    medium_priority: 300
    person_high: 1000
    person_medium: 500
  # 内容长度要求（字符数）
  min_content_length: 50

# 文章生成配置
article_generation:
  style: "深度解读型"
  structure:
    - "导语：一句话概括核心事件"
    - "背景：这个发布/观点的重要性"
    - "核心内容：详细解读"
    - "行业影响：对AI领域的意义"
    - "延伸阅读：相关链接"
  max_length: 2000  # 中文字数
  include_translation: true
  include_opinion: true  # 添加解读观点

# 存储路径
storage:
  processed_tweets: "data/processed_tweets.json"
  generated_articles: "data/articles/"
  logs: "data/logs/"
